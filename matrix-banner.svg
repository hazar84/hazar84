    <text x="280" y="70" opacity="0.5">011001</text>
    <text x="330" y="140" opacity="0.9">111000</text>
    <text x="380" y="30" opacity="0.3">000111</text>
    <text x="430" y="100" opacity="0.6">101101</text>
