  <!-- Анимированный курсор -->
  <text x="400" y="220" font-family="Fira Code, monospace" font-size="28" fill="#00FF41" text-anchor="middle">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    _
  </text>
  
</svg>
