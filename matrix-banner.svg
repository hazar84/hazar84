    <text x="30" y="40" opacity="0.6">010101</text>
    <text x="80" y="80" opacity="0.3">101010</text>
    <text x="130" y="120" opacity="0.8">110011</text>
    <text x="180" y="50" opacity="0.4">001100</text>
