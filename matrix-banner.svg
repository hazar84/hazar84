    <text x="530" y="60" opacity="0.8">110101</text>
    <text x="580" y="130" opacity="0.5">001011</text>
    <text x="630" y="90" opacity="0.7">100001</text>
    <text x="680" y="150" opacity="0.3">011110</text>
    <text x="730" y="50" opacity="0.6">111100</text>
    <text x="770" y="110" opacity="0.4">000011</text>
    
    <text x="50" y="250" opacity="0.5">110100</text>
