<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
    <!-- Ссылка на ваш Matrix GIF или SVG в качестве фона -->
    <image href="https://raw.githubusercontent.com/rodrigograca31/rodrigograca31/master/matrix.svg" width="800" height="300" />
    
    <!-- Этот тег позволяет встроить HTML -->
    <foreignObject x="0" y="0" width="800" height="300">
        <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-family: 'Fira Code', monospace; background-color: transparent;">
            <!-- Здесь ваш анимированный текст -->
            <div style="font-size: 28px; font-weight: 600; color: #00FF41; text-align: center;">
                Привет, меня зовут Сергей!<br/>
                <span style="font-size: 20px;">JavaScript / TypeScript Developer</span>
            </div>
        </div>
    </foreignObject>
</svg>
